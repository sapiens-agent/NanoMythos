model:
  vocab_size: 129280
  hidden_size: 320
  num_hidden_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 1
  moe_intermediate_size: 640
  n_routed_experts: 4
  n_shared_experts: 1
  num_experts_per_tok: 2
  q_lora_rank: 160
  head_dim: 96
  qk_rope_head_dim: 32
  o_groups: 2
  o_lora_rank: 80
  hc_mult: 4
  hc_sinkhorn_iters: 2
  hc_eps: 1.0e-6
  num_hash_layers: 0
  swiglu_limit: 0.0
  scoring_func: sqrtsoftplus
  routed_scaling_factor: 1.5
  max_position_embeddings: 2048
  rms_norm_eps: 1.0e-6
  rope_theta: 10000.0
  initializer_range: 0.02
  tie_word_embeddings: false
  attention_bias: false
  attention_dropout: 0.0
  compress_ratios: [0, 0, 0, 0, 0, 0, 0, 0, 0]
  hidden_smoothness_lambda: 0.0
  hidden_norm_lambda: 0.0
  recurrent_enabled: true
  recurrent_prelude_layers: 2
  recurrent_core_layers: 4
  recurrent_steps: 1
  recurrent_coda_layers: 2
  recurrent_use_loop_embedding: true
  recurrent_max_steps: 8
training:
  max_seq_length: 512
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 6.0e-4
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  max_grad_norm: 1.0
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  bf16: false
  max_steps: 2000
  save_steps: 500
  logging_steps: 10
  gradient_checkpointing: true
