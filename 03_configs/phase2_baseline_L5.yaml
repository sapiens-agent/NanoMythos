# Same as phase2_smoke_baseline but 5 transformer layers (depth control vs t4 recurrence).
model:
  vocab_size: 129280
  hidden_size: 64
  num_hidden_layers: 5
  num_attention_heads: 4
  num_key_value_heads: 1
  moe_intermediate_size: 128
  n_routed_experts: 4
  n_shared_experts: 1
  num_experts_per_tok: 2
  q_lora_rank: 32
  head_dim: 32
  qk_rope_head_dim: 16
  o_groups: 2
  o_lora_rank: 16
  hc_mult: 4
  hc_sinkhorn_iters: 5
  hc_eps: 1.0e-6
  num_hash_layers: 0
  swiglu_limit: 0.0
  scoring_func: sqrtsoftplus
  routed_scaling_factor: 1.5
  max_position_embeddings: 512
  rms_norm_eps: 1.0e-6
  tie_word_embeddings: false
  compress_ratios: [0, 0, 0, 0, 0, 0]
  hidden_smoothness_lambda: 0.0
  hidden_norm_lambda: 0.0

training:
  max_seq_length: 256
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 1
  learning_rate: 3.0e-4
  max_steps: 100
  warmup_steps: 2
  bf16: true
  gradient_checkpointing: true
